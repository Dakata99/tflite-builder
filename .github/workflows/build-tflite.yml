name: Build TensorFlow

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - version: "v2.21.0"
            source: "bazel"
            arch: "x86-64"

    steps:
      # 1. Download your repository into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # 3. Build TensorFlow Lite using uv
      - name: Build TensorFlow
        run: |
          source setupenv
          uv run tf clone --branch-tag ${{ matrix.version }}
          uv run tf build --branch-tag ${{ matrix.version }} --${{ matrix.source }}
          uv run tf install --branch-tag ${{ matrix.version }} --source ${{ matrix.source }}
          uv run tf run --install-path $(pwd)/builds/${{ matrix.version }}--${{ matrix.source }}--${{ matrix.arch }}/

      # 4. Publish the artifacts so they can be downloaded
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tensorflow-build-${{ matrix.version }}--${{ matrix.source }}--${{ matrix.arch }}
          path: ${{ github.workspace }}/builds/${{ matrix.version }}--${{ matrix.source }}--${{ matrix.arch }}/
          if-no-files-found: error
