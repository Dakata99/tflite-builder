name: Build TensorFlow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'TensorFlow version tag (e.g., v2.21.0)'
        required: true
        default: 'v2.21.0'
        type: string
      source:
        description: 'Build system'
        required: true
        default: 'bazel'
        type: choice
        options:
          - bazel
          - cmake
      arch:
        description: 'Target architecture'
        required: true
        default: 'x86-64'
        type: choice
        options:
          - x86-64

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - version: "v2.21.0"
            source: "bazel"
            arch: "x86-64"
          - version: "v2.16.1"
            source: "bazel"
            arch: "x86-64"
    env:
      BUILD_VERSION: ${{ github.event.inputs.version || matrix.version }}
      BUILD_SOURCE: ${{ github.event.inputs.source || matrix.source }}
      BUILD_ARCH: ${{ github.event.inputs.arch || matrix.arch }}

    steps:
      # 1. Download your repository into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # 3. Build TensorFlow Lite using uv
      - name: Build TensorFlow
        run: |
          source setupenv
          uv run tf clone --branch-tag ${{ env.BUILD_VERSION }}
          uv run tf build --branch-tag ${{ env.BUILD_VERSION }} --${{ env.BUILD_SOURCE }}
          uv run tf install --branch-tag ${{ env.BUILD_VERSION }} --build-system ${{ env.BUILD_SOURCE }}
          uv run tf run --install-path $(pwd)/builds/${{ env.BUILD_VERSION }}--${{ env.BUILD_SOURCE }}/

      # 4. Publish the artifacts so they can be downloaded
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tensorflow-build-${{ env.BUILD_VERSION }}--${{ env.BUILD_SOURCE }}--${{ env.BUILD_ARCH }}
          path: ${{ github.workspace }}/builds/${{ env.BUILD_VERSION }}--${{ env.BUILD_SOURCE }}/
          if-no-files-found: error
          retention-days: 1
