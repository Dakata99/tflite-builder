name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run dev-lint

      - name: Format check
        run: uv run dev-fmt --check

      - name: Type check
        run: uv run dev-check

  build-tflite:
    strategy:
      fail-fast: false
      matrix:
        version: [v2.21.0, v2.16.1]
        build_system: [bazel, cmake]
    uses: ./.github/workflows/build-tflite.yml
    with:
      version: ${{ matrix.version }}
      build_system: ${{ matrix.build_system }}
      arch: x86-64
